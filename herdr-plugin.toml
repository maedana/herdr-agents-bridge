id = "maedana.agents-bridge"
name = "Agents Bridge"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Mobile bridge for Herdr agents (web server + QR code)"
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[panes]]
id = "qr"
title = "Agents Bridge QR"
placement = "popup"
width = "50%"
height = "60%"
command = ["sh", "-c", "${HERDR_PLUGIN_ROOT}/target/release/herdr-agents-bridge qr"]

[[panes]]
id = "qr-tunnel"
title = "Agents Bridge QR (Tunnel)"
placement = "popup"
width = "50%"
height = "60%"
command = ["sh", "-c", "${HERDR_PLUGIN_ROOT}/target/release/herdr-agents-bridge qr-tunnel"]

[[actions]]
id = "stop"
title = "Stop Agents Bridge"
contexts = ["global"]
command = ["sh", "-c", "${HERDR_PLUGIN_ROOT}/target/release/herdr-agents-bridge stop"]
