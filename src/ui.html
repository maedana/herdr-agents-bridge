<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VoiceBridge</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f7;
         display: flex; flex-direction: column; }

  #tab-bar { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
             padding: 0 0 8px; flex-shrink: 0; gap: 6px; }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 6px 12px; font-size: 0.8rem;
         background: #f0f0f5; border: 1px solid #d2d2d7;
         border-radius: 8px; cursor: pointer; max-width: 180px;
         white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1d1d1f; }
  .tab.focused { background: #007aff; color: #fff; border-color: #007aff; }
  .tab .tab-status { font-size: 0.65rem; opacity: 0.7; }

  #agent-output { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #agent-output pre { background: #1e1e1e; color: #d4d4d4;
                      padding: 12px; font-size: 0.7rem; line-height: 1.4;
                      white-space: pre-wrap; word-break: break-all;
                      min-height: 100%; margin: 0; }

  #bottom-bar { flex-shrink: 0; background: #fff; border-top: 1px solid #d2d2d7;
                padding: 8px 12px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #input-row textarea { flex: 1; height: 60px; font-size: 1rem;
                        padding: 8px; border: 1px solid #d2d2d7; border-radius: 10px; resize: none; }
  #btn-col { display: flex; flex-direction: column; gap: 4px; }
  #btn-col button { padding: 8px 14px; font-size: 0.85rem; font-weight: 600;
                    border: none; border-radius: 8px; cursor: pointer; }
  #sendBtn { background: #007aff; color: #fff; }
  #sendBtn:active { background: #0051a8; }
  #escBtn { background: #e5e5ea; color: #333; }
  #escBtn:active { background: #c7c7cc; }
  .bottom-options { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .bottom-options label { font-size: 0.8rem; color: #6e6e73; }
  .bottom-options input[type=checkbox] { width: 16px; height: 16px; }
  #status { font-size: 0.75rem; color: #6e6e73; min-height: 1em; margin-top: 4px; }
</style>
</head>
<body>
<div id="agent-output"></div>
<div id="bottom-bar">
  <div id="tab-bar"></div>
  <div id="input-row">
    <textarea id="txt" autofocus placeholder="マイクボタンで話す"></textarea>
    <div id="btn-col">
      <button id="sendBtn" onclick="send()">送信</button>
      <button id="escBtn" onclick="sendKey('Escape')">Esc</button>
    </div>
  </div>
  <div class="bottom-options">
    <input type="checkbox" id="enterChk" checked>
    <label for="enterChk">送信後にEnter</label>
  </div>
  <div id="status"></div>
</div>
<script>
const TOKEN = '__SESSION_TOKEN__';
history.replaceState(null, '', '/');

async function send() {
  const txt = document.getElementById('txt');
  const text = txt.value.trim();
  if (!text) { setStatus('テキストを入力してください'); return; }
  const enter = document.getElementById('enterChk').checked;
  setStatus('送信中...');
  try {
    const res = await fetch('/input', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-VoiceBridge-Token': TOKEN},
      body: JSON.stringify({text, enter})
    });
    const data = await res.json();
    if (data.status === 'ok') {
      setStatus('✓ 送信しました（' + data.length + '文字）');
      txt.value = '';
      txt.focus();
    } else {
      setStatus('エラー: ' + JSON.stringify(data));
    }
  } catch(e) {
    setStatus('接続エラー: ' + e.message);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendKey(key) {
  setStatus(key + ' 送信中...');
  try {
    const res = await fetch('/key', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-VoiceBridge-Token': TOKEN},
      body: JSON.stringify({key})
    });
    const data = await res.json();
    if (data.status === 'ok') {
      setStatus('✓ ' + key + ' を送信しました');
    } else {
      setStatus('エラー: ' + JSON.stringify(data));
    }
  } catch(e) {
    setStatus('接続エラー: ' + e.message);
  }
}

function renderTabs(agents) {
  const el = document.getElementById('tab-bar');
  if (!agents.length) { el.innerHTML = ''; return; }
  el.innerHTML = agents.map(a => {
    const cls = a.focused ? 'tab focused' : 'tab';
    const repo_branch = a.repo + (a.branch ? ':' + a.branch : '');
    return '<div class="' + cls + '" onclick="focusAgent(\'' + escHtml(a.pane_id) + '\')">'
      + escHtml(repo_branch)
      + ' <span class="tab-status">' + escHtml(a.status) + '</span>'
      + '</div>';
  }).join('');
}

function renderOutput(html) {
  const el = document.getElementById('agent-output');
  el.innerHTML = '<pre>' + html + '</pre>';
  el.scrollTop = el.scrollHeight;
}

async function focusAgent(paneId) {
  try {
    const res = await fetch('/herdr/focus', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-VoiceBridge-Token': TOKEN},
      body: JSON.stringify({pane_id: paneId})
    });
    const data = await res.json();
    if (data.status === 'ok') {
      setStatus('✓ エージェント切り替え');
      const r1 = await fetch('/herdr/agents');
      if (r1.ok) renderTabs(await r1.json());
      const r2 = await fetch('/herdr/read?pane_id=' + encodeURIComponent(paneId) + '&lines=50');
      if (r2.ok) { const d = await r2.json(); renderOutput(d.html); }
    } else {
      setStatus('エラー: ' + JSON.stringify(data));
    }
  } catch(e) {
    setStatus('接続エラー: ' + e.message);
  }
}

function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(proto + '//' + location.host + '/herdr/ws');
  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    if (msg.type === 'agents') renderTabs(msg.agents);
    if (msg.type === 'output') renderOutput(msg.html);
  };
  ws.onclose = function() { setTimeout(connectWs, 3000); };
  ws.onerror = function() { ws.close(); };
}
connectWs();

function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
</html>
